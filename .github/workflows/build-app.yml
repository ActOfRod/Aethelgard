name: Build desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            args: --win
            artifact: windows
          - os: ubuntu-latest
            args: --linux
            artifact: linux
          - os: macos-latest
            args: --mac
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder ${{ matrix.args }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: aethelgard-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
          if-no-files-found: error
